<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Document</title>
</head>
<body>
    <header class="cabecalho-principal">
        <h1 class="titulo-site">Comunidade Dev</h1>
        <nav class="menu-navegação">
            <a href="../index.html" class="link-menu">Inicio</a>
        </nav>
    </header>

    <div class="container-layout">
        <main class="conteudo-principal">
            <h2 class="subtitulo">Junte-se a nós</h2>

            <form class="formulario-cadastro">
                <label for="nome" class="rotulo-campo">Seu Nome:</label>
                <input type="text" id="nome" class="campo-entrada" placeholder="Digite o seu nome completo">

                <label for="email" class="rotulo-campo">Seu Email:</label>
                <input type="email" id="email" class="campo-entrada" placeholder="nome@example.com">

                <button type="submit" class="botao-enviar">Quero Participar</button>
            </form>
        </main>

        <footer class="rodape-site">
            <p class="texto-rodape">@2023 Comunidade Dev. Todos os direitos reservados.</p>
        </footer>
</body>
</html>
